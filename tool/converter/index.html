<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>MP4 → MP3 локально</title>
</head>
<body>
  <h1>Конвертер MP4 → MP3</h1>
  <input type="file" id="fileInput" accept="video/mp4">
  <button id="convertBtn">Конвертировать</button>
  <a id="downloadLink" style="display:none;">Скачать MP3</a>

  <!-- Создаём Module перед ffmpeg-asm.js -->
  <script>
    var Module = {
      print: (text) => console.log(text),
      printErr: (text) => console.error(text),
      noInitialRun: true
    };
  </script>

  <script src="ffmpeg-asm.js"></script>

  <script>
    const fileInput = document.getElementById('fileInput');
    const convertBtn = document.getElementById('convertBtn');
    const downloadLink = document.getElementById('downloadLink');

    convertBtn.addEventListener('click', () => {
      const file = fileInput.files[0];
      if (!file) return alert('Выберите MP4 файл');

      const reader = new FileReader();
      reader.onload = function() {
        const result = new Uint8Array(reader.result);

        // создаём виртуальную файловую систему
        Module.FS_createDataFile('/', 'input.mp4', result, true, true);

        // конвертируем
        Module.callMain(['-i', 'input.mp4', '-q:a', '0', '-map', 'a', 'output.mp3']);

        // читаем результат
        const mp3Data = Module.FS_readFile('output.mp3');
        const blob = new Blob([mp3Data], { type: 'audio/mp3' });
        const url = URL.createObjectURL(blob);

        downloadLink.href = url;
        downloadLink.download = 'output.mp3';
        downloadLink.style.display = 'block';
      };
      reader.readAsArrayBuffer(file);
    });
  </script>
</body>
</html>
