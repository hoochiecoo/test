<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>MP4 → MP3 конвертер</title>
  <style>
    body { font-family: Arial; text-align: center; padding: 50px; }
    input, button { margin: 10px; padding: 10px; font-size: 16px; }
    a { display: block; margin-top: 20px; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Конвертер MP4 → MP3 (локально)</h1>
  <input type="file" id="fileInput" accept="video/mp4">
  <button id="convertBtn">Конвертировать</button>
  <div id="status"></div>
  <a id="downloadLink" href="#" style="display:none;">Скачать MP3</a>

  <script type="module">
    import { createFFmpeg, fetchFile } from './ffmpeg.mjs'; // Локальный JS

    const ffmpeg = createFFmpeg({ log: true });
    const fileInput = document.getElementById('fileInput');
    const convertBtn = document.getElementById('convertBtn');
    const status = document.getElementById('status');
    const downloadLink = document.getElementById('downloadLink');

    convertBtn.addEventListener('click', async () => {
      const file = fileInput.files[0];
      if (!file) { alert('Выберите MP4 файл!'); return; }

      status.textContent = 'Загрузка ffmpeg.wasm...';
      if (!ffmpeg.isLoaded()) await ffmpeg.load();

      status.textContent = 'Конвертация в MP3...';
      ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(file));

      await ffmpeg.run('-i', 'input.mp4', '-q:a', '0', '-map', 'a', 'output.mp3');

      const data = ffmpeg.FS('readFile', 'output.mp3');
      const mp3Blob = new Blob([data.buffer], { type: 'audio/mp3' });
      const url = URL.createObjectURL(mp3Blob);

      downloadLink.href = url;
      downloadLink.download = file.name.replace(/\.[^/.]+$/, '') + '.mp3';
      downloadLink.style.display = 'block';
      downloadLink.textContent = 'Скачать MP3';

      status.textContent = 'Готово!';
    });
  </script>
</body>
</html>
